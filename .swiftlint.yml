included:
  - ios/copyPaste
  - ios/ClipboardKeyboard
  - ios/ClipboardWidget
  - ios/copyPasteTests
  - ios/copyPasteUITests

excluded:
  - ios/build
  - build
  - functions
  - temp

disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - identifier_name
  - trailing_whitespace
  - todo
  - nesting

opt_in_rules:
  - custom_rules

force_cast: warning
force_try: warning
large_tuple: warning

custom_rules:
  unsafe_coredata_context_access:
    included: ".*\\.swift"
    excluded: "PersistenceController\\.swift"
    regex: "\\bPersistenceController\\.shared\\.(newBackgroundContext|viewContext|container)\\b"
    match_kinds:
      - identifier
    message: >
      PersistenceController.shared.newBackgroundContext/viewContext/container への直接アクセスは禁止。
      ストア読み込み完了前の書き込みで即クラッシュしうるため、必ず
      PersistenceController.shared.performBackgroundTask(_:) 経由でCoreDataにアクセスすること。
    severity: error
